<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>技術解析レポート — Bank of Technology</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 600px;
      padding: 60px 40px;
      text-align: center;
    }
    .label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 48px;
    }
    h1 {
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 300;
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin-bottom: 32px;
    }
    h1 span { color: #555; }
    p {
      font-size: 16px;
      color: #666;
      line-height: 2;
      margin-bottom: 48px;
    }
    .btn {
      display: inline-block;
      padding: 16px 40px;
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      transition: border-color 0.3s;
    }
    .btn:hover { border-color: rgba(255,255,255,0.6); }
    footer {
      position: fixed;
      bottom: 32px;
      width: 100%;
      text-align: center;
      font-size: 11px;
      color: #333;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="label">Bank of Technology — 技術解析レポート</p>
    <h1>解析レポートは<br /><span>Noteで公開中。</span></h1>
    <p>
      室温超伝導、量子コンピュータ、エネルギー転換、<br />
      バイオ、ロボティクス、素材、ニューロ、宇宙——<br /><br />
      各レポートはNoteにて個別に公開しています。
    </p>
    <a href="https://note.com/" class="btn">Noteで読む →</a>
  </div>
  <footer>© 2026 Bank of Technology</footer>
</body>
</html>
